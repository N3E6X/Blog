<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N3E6X</title>
  <meta name="description" content="N3E6X — A minimal blog.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="header" role="banner">
    <nav class="nav" aria-label="Main navigation">
      <a href="#/" class="nav__logo" aria-label="N3E6X home">
        <span class="nav__logo-text">N3E6X</span>
        <span class="nav__logo-dot"></span>
      </a>
      <div class="nav__actions">
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
          <span class="theme-toggle__icon theme-toggle__icon--dark">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </span>
          <span class="theme-toggle__icon theme-toggle__icon--light">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="4"/>
              <line x1="12" y1="2" x2="12" y2="4"/>
              <line x1="12" y1="20" x2="12" y2="22"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="2" y1="12" x2="4" y2="12"/>
              <line x1="20" y1="12" x2="22" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </span>
        </button>
      </div>
    </nav>
    <div class="header__progress" id="reading-progress" aria-hidden="true"></div>
  </header>

  <main id="main" class="main" role="main">
    <div id="app" aria-live="polite" aria-atomic="false"></div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <span class="footer__brand">N3E6X</span>
      <span class="footer__copy">&copy; 2025</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
