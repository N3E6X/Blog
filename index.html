<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N3E6X</title>
  <meta name="description" content="N3E6X — A minimal blog.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a href="#main" class="skip-link">SKIP TO CONTENT</a>

  <!-- Reading Progress -->
  <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>

  <header class="header" role="banner">
    <nav class="nav" aria-label="Main navigation">
      <a href="#/" class="nav__logo">N3E6X</a>
      <div class="nav__actions">
        <button class="nav__toggle" id="theme-toggle" type="button" aria-label="Toggle light mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square">
            <circle cx="12" cy="12" r="4"/>
            <line x1="12" y1="2" x2="12" y2="4"/>
            <line x1="12" y1="20" x2="12" y2="22"/>
            <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>
            <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>
            <line x1="2" y1="12" x2="4" y2="12"/>
            <line x1="20" y1="12" x2="22" y2="12"/>
            <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/>
            <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>
          </svg>
        </button>
      </div>
    </nav>
  </header>

  <main id="main" class="main" role="main">
    <div id="app" class="app-container" aria-live="polite"></div>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <span>&copy; 2025 N3E6X</span>
      <span class="footer__separator">—</span>
      <span>MINIMAL BLOG SYSTEM</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
